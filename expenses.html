<div class="card shadow p-4">

<h3>Add New Expense</h3>

<form id="expenseForm">

<input
type="text"
class="form-control mb-3"
placeholder="Expense Name">

<select
class="form-select mb-3">

<option>Food</option>
<option>Travel</option>
<option>Bills</option>
<option>Shopping</option>

</select>

<input
type="number"
class="form-control mb-3"
placeholder="Amount">

<input
type="date"
class="form-control mb-3">

<button
class="btn btn-success">

Save Expense

</button>

</form>

</div>
